<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasturi Luxe | Saree Manufacturing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300&family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-dark: #8A642A;
            --gold-main: #C5A059;
            --gold-bright: #F3E5AB;
            --silk-white: #FBF9F6;
            --deep-charcoal: #1A1A1A;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #ffffff 0%, var(--silk-white) 100%);
            color: var(--deep-charcoal);
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Premium Frame */
        .premium-frame {
            position: fixed;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 1px solid var(--gold-main);
            pointer-events: none;
            z-index: 100;
            opacity: 0.6;
        }

        /* Corner Accents */
        .premium-frame::before, .premium-frame::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--gold-dark);
            pointer-events: none;
        }
        .premium-frame::before { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .premium-frame::after { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        .scroll-container {
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
        }

        .serif {
            font-family: 'Cormorant Garamond', serif;
        }
        
        .fade-in {
            animation: fadeIn 2.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gold-gradient-text {
            background: linear-gradient(75deg, var(--gold-dark) 0%, var(--gold-main) 35%, var(--gold-bright) 50%, var(--gold-main) 65%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 6s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .btn-gold-outline {
            border: 1px solid var(--gold-main);
            background: transparent;
            color: var(--deep-charcoal);
            position: relative;
            z-index: 1;
            transition: all 0.4s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-gold-outline:active {
            transform: scale(0.98);
            background-color: var(--gold-main);
            color: white;
        }

        @media (min-width: 768px) {
            .btn-gold-outline::before {
                content: "";
                position: absolute;
                top: 0; left: 0; width: 0; height: 100%;
                background: linear-gradient(90deg, var(--gold-dark), var(--gold-main));
                z-index: -1;
                transition: width 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            }
            .btn-gold-outline:hover {
                color: white;
                border-color: transparent;
            }
            .btn-gold-outline:hover::before {
                width: 100%;
            }
        }

        .brand-title {
            font-size: clamp(3.5rem, 15vw, 8rem);
            line-height: 0.95;
        }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <div class="premium-frame"></div>

    <div class="scroll-container">
        <!-- Header -->
        <nav class="pt-10 pb-6 md:pt-20 md:pb-12 flex flex-col items-center w-full fade-in px-4">
            <h1 class="brand-title tracking-[0.15em] uppercase font-bold serif gold-gradient-text text-center">
                Kasturi <br> Luxe
            </h1>
            <p class="text-[10px] md:text-[14px] uppercase tracking-[0.5em] mt-6 opacity-60 font-medium text-center">
                Venture by Kasturi Group
            </p>
        </nav>

        <!-- Main Content -->
        <main class="flex-grow flex flex-col items-center justify-center px-6 text-center fade-in" style="animation-delay: 0.3s;">
            <div class="mb-8 md:mb-16">
                <h2 class="serif text-lg md:text-2xl italic font-light opacity-90 mb-4">Specialised in Saree manufacturing.</h2>
                <div class="h-[1px] w-12 md:w-20 bg-gradient-to-r from-transparent via-[#C5A059] to-transparent mx-auto opacity-40"></div>
            </div>

            <!-- Contact Section -->
            <div class="w-full max-w-lg md:max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-16 mb-8">
                <!-- Kashish Doshi -->
                <div class="flex flex-col items-center">
                    <p class="serif text-xl md:text-2xl italic mb-1 font-medium">Kashish Doshi</p>
                    <p class="text-sm md:text-base font-light tracking-[0.15em] mb-4 md:mb-6 opacity-60">+91 99259 89333</p>
                    <button onclick="downloadVCard('Kashish Doshi', '+919925989333')" 
                            class="btn-gold-outline px-10 py-4 text-[9px] uppercase tracking-[0.25em] w-full max-w-[220px] shadow-sm">
                        Save Contact
                    </button>
                </div>

                <!-- Harsh Doshi -->
                <div class="flex flex-col items-center">
                    <p class="serif text-xl md:text-2xl italic mb-1 font-medium">Harsh Doshi</p>
                    <p class="text-sm md:text-base font-light tracking-[0.15em] mb-4 md:mb-6 opacity-60">+91 99790 89333</p>
                    <button onclick="downloadVCard('Harsh Doshi', '+919979089333')" 
                            class="btn-gold-outline px-10 py-4 text-[9px] uppercase tracking-[0.25em] w-full max-w-[220px] shadow-sm">
                        Save Contact
                    </button>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="pb-10 pt-4 text-center fade-in px-6" style="animation-delay: 0.6s;">
            <p class="text-[10px] uppercase tracking-[0.6em] gold-gradient-text font-bold mb-3">Opening April 24, 2025</p>
            <p class="text-[9px] md:text-[11px] uppercase tracking-[0.2em] opacity-60 mb-6 leading-relaxed max-w-[300px] mx-auto">
                F-114 / 115 New T.T. Market<br>
                Ring Road, Surat, Guj. 395002
            </p>
            <div class="h-[1px] w-8 bg-gradient-to-r from-transparent via-[#C5A059] to-transparent mx-auto opacity-30"></div>
        </footer>
    </div>

    <script>
        function downloadVCard(name, phone) {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Kasturi Luxe | ${name}
TEL;TYPE=CELL:${phone}
ORG:Kasturi Luxe (Kasturi Group)
ADR;TYPE=WORK:;;F-114 / 115 New T.T. Market;Surat;Guj.;395002;India
NOTE:Saree Manufacturing Specialists
END:VCARD`;

            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.style.display = "none";
            a.href = url;
            a.download = `${name.replace(/\s+/g, '_')}_Kasturi_Luxe.vcf`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-16 left-1/2 -translate-x-1/2 bg-white text-stone-900 text-[9px] uppercase tracking-widest px-8 py-4 z-[200] border border-[#C5A059] shadow-xl w-[80%] max-w-[280px] text-center';
            toast.style.boxShadow = '0 10px 40px rgba(197, 160, 89, 0.25)';
            toast.innerText = 'Contact Information Saved';
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.8s ease';
                setTimeout(() => toast.remove(), 800);
            }, 2000);
        }
    </script>
</body>
</html>
