<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasturi Luxe | Saree Manufacturing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300&family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-dark: #8A642A;
            --gold-main: #C5A059;
            --gold-bright: #F3E5AB;
            --silk-white: #FBF9F6;
            --deep-charcoal: #1A1A1A;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #ffffff 0%, var(--silk-white) 100%);
            color: var(--deep-charcoal);
            overflow-x: hidden;
        }

        .serif {
            font-family: 'Cormorant Garamond', serif;
        }
        
        .fade-in {
            animation: fadeIn 2.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Gradient Typography */
        .gold-gradient-text {
            background: linear-gradient(75deg, var(--gold-dark) 0%, var(--gold-main) 35%, var(--gold-bright) 50%, var(--gold-main) 65%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Enhanced Buttons with Gradients */
        .btn-gold-outline {
            border: 1px solid var(--gold-main);
            background: transparent;
            color: var(--deep-charcoal);
            position: relative;
            z-index: 1;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .btn-gold-outline::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 0; height: 100%;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold-main));
            z-index: -1;
            transition: width 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .btn-gold-outline:hover {
            color: white;
            border-color: transparent;
        }

        .btn-gold-outline:hover::before {
            width: 100%;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--silk-white); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--gold-main), var(--gold-dark)); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <nav class="pt-16 pb-8 md:pt-24 md:pb-12 flex flex-col items-center w-full fade-in">
        <h1 class="text-6xl md:text-9xl tracking-[0.2em] uppercase font-bold serif gold-gradient-text leading-tight text-center">
            Kasturi <br class="md:hidden"> Luxe
        </h1>
        <p class="text-[12px] md:text-[14px] uppercase tracking-[0.8em] mt-8 opacity-70 font-medium">Venture by Kasturi Group</p>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center px-6 text-center fade-in" style="animation-delay: 0.3s;">
        <div class="mb-12">
            <h2 class="serif text-xl md:text-3xl italic font-light opacity-90 mb-4">Specialised in Saree manufacturing.</h2>
            <div class="h-[1px] w-24 bg-gradient-to-r from-transparent via-[#C5A059] to-transparent mx-auto opacity-40"></div>
        </div>

        <!-- Contact Section -->
        <div class="w-full max-w-4xl grid md:grid-cols-2 gap-12 md:gap-20 mb-12">
            <!-- Kashish Doshi -->
            <div class="flex flex-col items-center group">
                <p class="serif text-2xl italic mb-1 font-medium">Kashish Doshi</p>
                <p class="text-base font-light tracking-[0.2em] mb-6 opacity-80">+91 99259 89333</p>
                <button onclick="downloadVCard('Kashish Doshi', '+919925989333')" 
                        class="btn-gold-outline px-12 py-3 text-[10px] uppercase tracking-[0.3em] w-56 shadow-sm">
                    Save Contact
                </button>
            </div>

            <!-- Harsh Doshi -->
            <div class="flex flex-col items-center group">
                <p class="serif text-2xl italic mb-1 font-medium">Harsh Doshi</p>
                <p class="text-base font-light tracking-[0.2em] mb-6 opacity-80">+91 99790 89333</p>
                <button onclick="downloadVCard('Harsh Doshi', '+919979089333')" 
                        class="btn-gold-outline px-12 py-3 text-[10px] uppercase tracking-[0.3em] w-56 shadow-sm">
                    Save Contact
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="p-12 text-center fade-in" style="animation-delay: 0.6s;">
        <p class="text-[11px] uppercase tracking-[0.7em] gold-gradient-text font-bold mb-3">Opening April 24, 2025</p>
        <div class="h-[1px] w-12 bg-gradient-to-r from-transparent via-[#C5A059] to-transparent mx-auto opacity-40"></div>
    </footer>

    <script>
        function downloadVCard(name, phone) {
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Kasturi Luxe | ${name}
TEL;TYPE=CELL:${phone}
ORG:Kasturi Luxe (Kasturi Group)
NOTE:Saree Manufacturing Specialists
END:VCARD`;

            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.style.display = "none";
            a.href = url;
            a.download = `${name.replace(/\s+/g, '_')}_Kasturi_Luxe.vcf`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-12 left-1/2 -translate-x-1/2 bg-white text-stone-900 text-[10px] uppercase tracking-widest px-12 py-5 z-50 border border-[#C5A059] shadow-2xl';
            toast.style.boxShadow = '0 10px 30px rgba(197, 160, 89, 0.2)';
            toast.innerText = 'Contact Information Downloaded';
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 1s ease';
                setTimeout(() => toast.remove(), 1000);
            }, 2000);
        }
    </script>
</body>
</html>
